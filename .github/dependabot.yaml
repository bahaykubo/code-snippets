version: 2
updates:
  - package-ecosystem: 'npm'
    directories:
      - '/javascript'
      - '/javascript-db-client'
      - '/typescript'
      - '/typescript-angular'
      - '/typescript-express-server'
      - '/typescript-graphql-client'
      - '/typescript-kafka-client'
      - '/typescript-mongodb-client'
      - '/typescript-node-package'
      - '/typescript-test-cypress'
      - '/typescript-test-jest'
      - '/typescript-test-k6'
      - '/typescript-test-mocha'
      - '/typescript-test-playwright'
      - '/typescript-test-playwright-mocha'
      - '/typescript-test-webdriverio'
      - '/typescript-xml'
    schedule:
      interval: weekly
      time: '06:00'
      day: 'monday'
      timezone: 'Pacific/Auckland'
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: chromedriver
  - package-ecosystem: 'pip'
    directories:
      - '/python'
      - '/python-test'
    schedule:
      interval: weekly
      time: '06:00'
      day: 'tuesday'
      timezone: 'Pacific/Auckland'
    open-pull-requests-limit: 10
  - package-ecosystem: 'gradle'
    directories:
      - '/java-javalin'
      - '/java-test-restassured'
    schedule:
      interval: weekly
      time: '06:00'
      day: 'wednesday'
      timezone: 'Pacific/Auckland'
    open-pull-requests-limit: 10
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: weekly
      time: '06:00'
      day: 'thursday'
      timezone: 'Pacific/Auckland'
    open-pull-requests-limit: 10
