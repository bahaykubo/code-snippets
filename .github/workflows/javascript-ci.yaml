name: Javascript - CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'javascript/**'
      - '.github/workflows/javascript-ci.yaml'

jobs:
  test:
    defaults:
      run:
        working-directory: ./javascript
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install npm packages
        run: npm run ci

      - name: Lint project
        if: always()
        run: npm run lint

      - name: Run tests
        if: always()
        run: npm test
