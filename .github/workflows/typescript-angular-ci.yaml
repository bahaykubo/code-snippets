name: Typescript - Angular - CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'typescript-angular/**'
      - '.github/workflows/typescript-angular-ci.yaml'

jobs:
  test:
    defaults:
      run:
        working-directory: ./typescript-angular
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install npm packages
        run: npm ci

      - name: Lint project
        if: always()
        run: npm run lint

      - name: Build project
        if: always()
        run: npm run build

      - name: Run tests
        if: always()
        run: npm test -- --no-watch --no-progress --browsers=ChromeHeadless
