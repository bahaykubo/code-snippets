name: Typescript - GraphQL Client - CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'typescript-graphql-client/**'
      - '.github/workflows/typescript-graphql-client-ci.yaml'

jobs:
  test:
    defaults:
      run:
        working-directory: ./typescript-graphql-client
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install npm packages
        run: npm run ci

      - name: Lint project
        if: always()
        run: npm run lint

      - name: Run tests
        if: always()
        run: npm test
