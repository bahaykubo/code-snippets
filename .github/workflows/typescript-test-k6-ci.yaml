name: Typescript - Test - k6

on:
  pull_request:
    branches: [main]
    paths:
      - 'typescript-test-k6/**'
      - '.github/workflows/typescript-test-k6-ci.yaml'

jobs:
  lint-and-build:
    defaults:
      run:
        working-directory: ./typescript-test-k6
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install npm packages
        run: npm run ci

      - name: Lint project
        if: always()
        run: npm run lint

      - name: Build test bundles
        run: npm run build
