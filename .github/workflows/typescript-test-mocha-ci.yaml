name: Typescript - Test - Mocha

on:
  pull_request:
    branches: [main]
    paths:
      - 'typescript-test-mocha/**'
      - '.github/workflows/typescript-test-mocha-ci.yaml'

jobs:
  test:
    defaults:
      run:
        working-directory: ./typescript-test-mocha
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install npm packages
        run: npm run ci

      - name: Lint project
        if: always()
        run: npm run lint

      - name: Start kafka
        run: ./scripts/docker/up.sh

      - name: Run tests
        if: always()
        run: npm test

      - name: Stop kafka
        if: always()
        run: ./scripts/docker/down.sh
