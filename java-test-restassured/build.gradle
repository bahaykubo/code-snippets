plugins {
    id "java"
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation "io.rest-assured:rest-assured:5.4.0"
    testImplementation "org.testng:testng:7.10.2"
    testImplementation "com.fasterxml.jackson.dataformat:jackson-dataformat-xml:2.13.0"
}

test {
    useTestNG()
    testLogging {
        events "passed", "skipped", "failed"
    }
}
